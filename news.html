<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ニュース | 株式会社Airu</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- ===== ヘッダー ===== -->
<header>
  <div class="container header-flex">

    <h1 class="logo">株式会社Airu</h1>

    <!-- ハンバーガー -->
    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <!-- メニュー -->
    <nav id="nav-menu">
      <ul class="nav-menu">
        <li><a href="index.html">ホーム</a></li>
        <li><a href="about.html">会社概要</a></li>
        <li><a href="news.html">ニュース</a></li>
        <li><a href="works.html">実績紹介</a></li>
        <li><a href="kaigo.html">介護情報基盤</a></li>
        <li><a href="contact.html">お問い合わせ</a></li>
      </ul>
    </nav>

  </div>
</header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>ニュース</h1>
      </div>
    </section>

    <section class="news-list">
      <div class="container">
        <!-- ★ここにJSONのニュースが自動表示されます -->
        <div id="news-list"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 株式会社Airu</p>
    </div>
  </footer>

  <script>
    fetch('/data/news.json')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('news-list');
        if (!list) return;

        list.innerHTML = '';

        data.forEach(item => {
          const article = document.createElement('article');
          article.className = 'news-card';

          const imageHtml = item.image
            ? `<img src="${item.image}" alt="${item.title}" class="news-image">`
            : '';

          const pdfHtml = item.pdf
            ? `<a href="${item.pdf}" class="pdf-link" download>📄 申込書PDFをダウンロード</a>`
            : '';

          article.innerHTML = `
            <time class="news-date">${item.date}</time>
            <h2 class="news-title">${item.title}</h2>
            <p class="news-summary">${item.summary || ''}</p>
            ${imageHtml}
            <p class="news-body">${item.content || ''}</p>
            ${pdfHtml}
          `;

          list.appendChild(article);
        });
      })
      .catch(err => console.error('news load error:', err));
  </script>
</body>
</html>
